name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift 6.0
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build debug
        run: swift build

      - name: Build release
        run: swift build -c release

      - name: Verify version output
        run: .build/debug/ktok --version

      - name: MCP smoke handshake
        shell: bash
        run: |
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list"}\n{"jsonrpc":"2.0","id":3,"method":"shutdown"}\n{"jsonrpc":"2.0","method":"exit"}\n' \
            | .build/debug/ktok mcp-server \
            | tee /tmp/ktok-mcp.out
          grep -q '"ktok-mcp"' /tmp/ktok-mcp.out
          grep -q '"ktok_read"' /tmp/ktok-mcp.out
